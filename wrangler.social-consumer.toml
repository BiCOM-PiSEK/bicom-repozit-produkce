name = "bicom-social-consumer"
main = "functions/api/_queue-social.js"
compatibility_date = "2026-01-01"

[[d1_databases]]
binding = "DB"
database_name = "bicom-pisek-db"
database_id = "c04cb289-2ff4-45d7-9fa0-3243c34c3abe"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "bicom-multimedia"

[[kv_namespaces]]
binding = "CACHE"
id = "57e7c49eaba94dd4ad9ede723ff69aab"

[ai]
binding = "AI"

[[queues.producers]]
binding = "BOOKING_QUEUE"
queue = "booking-jobs"

[[queues.producers]]
binding = "SOCIAL_QUEUE"
queue = "social-jobs"

[[queues.consumers]]
queue = "social-jobs"
max_batch_size = 5
