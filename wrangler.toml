name = "bicom-pisek"
compatibility_date = "2026-01-01"
pages_build_output_dir = "public"

# --- D1 databáze ---
[[d1_databases]]
binding = "DB"
database_name = "bicom-pisek-db"
database_id = "c04cb289-2ff4-45d7-9fa0-3243c34c3abe"

# --- R2 úložiště médií ---
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "bicom-multimedia"

# --- KV (cache, rate limit, session) ---
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_ID"

# --- Workers AI ---
[ai]
binding = "AI"

# --- Queues ---
[[queues.producers]]
binding = "BOOKING_QUEUE"
queue = "booking-jobs"

[[queues.producers]]
binding = "SOCIAL_QUEUE"
queue = "social-jobs"

[[queues.consumers]]
queue = "booking-jobs"
max_batch_size = 10

[[queues.consumers]]
queue = "social-jobs"
max_batch_size = 5

# --- Cron Triggers ---
[triggers]
crons = [
  "0 */1 * * *",   # reminders-dispatch
  "0 3 * * *",     # instagram-sync
  "30 3 * * *",    # gdpr-anonymize
  "0 4 * * 1",     # geo-insights
  "0 2 * * 0",     # d1-backup
  "0 8 * * *",     # social-publish (naplánované sdílení, např. ráno)
]

# Secrets se NIKDY nepíší sem. Nastav je: `wrangler secret put NAZEV`
# Lokálně: soubor .dev.vars (v .gitignore)
